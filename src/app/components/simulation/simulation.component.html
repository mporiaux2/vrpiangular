
<div class="controls">
  <button
    id="gauche"
    (pointerup)="toggleGauche()"
    [style.background]="gaucheSimul ? 'green' : 'grey'">
    Gauche
  </button>

  <button
    id="droite"
    (pointerup)="toggleDroite()"
    [style.background]="droiteSimul ? 'green' : 'grey'">
    Droite
  </button>
</div>


<div class="vit">
  <input id="vitesse" [(ngModel)]="vitesseAEnvoyer" placeholder="vitesse" (keyup.enter)="sendVit()"/>
</div>
